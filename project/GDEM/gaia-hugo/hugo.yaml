# Hugo Configuration — Gaia, Evolución del Ser
# Migración desde SWE WordPress (Simply Static) a Hugo con tema propio
# Reglas: R1-R6, R29 (§4 del plan de trabajo)

baseURL: "https://gaiaevoluciondelser.es/"
title: "Gaia Evolución del Ser"
languageCode: "es-ES"
disablePathToLower: true           # R2: Preservar URLs exactas del original
enableRobotsTXT: true              # R3: Generar robots.txt
enableEmoji: false

# R5: Permitir contenido HTML en content/
security:
  enableInlineShortcodes: false
  exec:
    allow:
      - "^dart-sass-embedded$"
      - "^go$"
      - "^npx$"
      - "^postcss$"
  funcs:
    getenv:
      - "^HUGO_"
      - "^CI$"
  http:
    methods:
      - "(?i)GET|POST"
    urls:
      - ".*"

# R6: URLs limpias basadas en slug
permalinks:
  pages: "/:slug/"

# Sitemap (R29 corregido)
sitemap:
  changefreq: monthly
  priority: 0.5
  filename: sitemap.xml

# Output formats (R29: sitemap requiere configuración)
outputs:
  home:
    - HTML
    - RSS
    - sitemap
  section:
    - HTML
    - RSS

