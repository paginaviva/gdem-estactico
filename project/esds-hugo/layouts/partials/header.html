{{/* Header — El Sonido del Silencio */}}
<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a href="/" class="logo" aria-label="{{ .Site.Title }} — Ir a inicio">
      <span class="logo__icon" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
          <circle cx="20" cy="20" r="19" stroke="currentColor" stroke-width="0.8" fill="none"/>
          <path d="M10 27 Q15 18 20 22 Q25 15 30 27" stroke="currentColor" stroke-width="0.6" fill="none"/>
          <path d="M18 26 L20 22 L22 26" stroke="currentColor" stroke-width="0.6" fill="none"/>
          <circle cx="20" cy="16" r="1.5" stroke="currentColor" stroke-width="0.5" fill="none"/>
          <path d="M12 20 L16 20 L16 23" stroke="currentColor" stroke-width="0.5" fill="none"/>
          <path d="M24 19 L28 19 L28 22" stroke="currentColor" stroke-width="0.5" fill="none"/>
          <path d="M14 11 Q16 9 18 11" stroke="currentColor" stroke-width="0.4" fill="none"/>
          <path d="M22 10 Q24 8 26 10" stroke="currentColor" stroke-width="0.4" fill="none"/>
        </svg>
      </span>
      <span class="logo__text">{{ .Site.Title }}</span>
    </a>

    <nav class="nav" role="navigation" aria-label="Navegación principal">
      <button class="nav-toggle" id="menu-toggle"
              aria-label="Abrir menú de navegación"
              aria-expanded="false"
              aria-controls="nav-list"
              type="button">
        <span class="nav-toggle__line" aria-hidden="true"></span>
        <span class="nav-toggle__line" aria-hidden="true"></span>
        <span class="nav-toggle__line" aria-hidden="true"></span>
      </button>

      <ul class="nav__list" id="nav-list" role="list">
        {{- range .Site.Menus.main }}
        <li class="nav__item">
          <a href="{{ .URL }}" class="nav__link">{{ .Name }}</a>
        </li>
        {{- end }}
      </ul>
    </nav>

    <a href="{{ .Site.Params.instagram_url }}" class="header-cta"
       target="_blank" rel="noopener noreferrer"
       aria-label="Síguenos en Instagram @elsonido.silencio">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor"/>
      </svg>
      <span>{{ .Site.Params.instagram }}</span>
    </a>
  </div>
</header>
