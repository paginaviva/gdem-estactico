{{ define "main" }}
<div class="ct-container-full" data-content="normal">
  <div class="entry-content is-layout-constrained">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <article>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
