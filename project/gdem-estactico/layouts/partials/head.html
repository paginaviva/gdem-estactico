<link rel="stylesheet" href="/css/framework.css" media="screen">
<link rel="stylesheet" href="/css/site.css" media="screen">
{{ with .Params.css }}
<link rel="stylesheet" href="/css/{{ . }}.css" media="screen">
{{ end }}
<link id="u-page-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&amp;family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&amp;family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900">
<script type="application/ld+json">{
  "@context": "http://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "logo": "/images/logo.png"
}</script>
<meta name="theme-color" content="#478ac9">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:type" content="website">
<link rel="canonical" href="{{ .Permalink }}">
